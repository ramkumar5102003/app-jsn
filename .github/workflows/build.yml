name: Build HTML to APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create app com.lalitha.tailors "Lalitha Tailors"
          
          # ఫైల్స్ కాపీ చేయడం
          cp index.html app/www/
          cp logo.png app/www/ || true
          cp watermark.png app/www/ || true
          
          # Android 12+ కోసం మెయిన్ ఫోల్డర్ లో కూడా లోగో పెట్టాలి
          cp logo.png app/ || true
          
          cd app
          # రోబోట్ బొమ్మను పూర్తిగా బ్లాక్ చేసి, ఆండ్రాయిడ్ కి డైరెక్ట్ గా మీ లోగోని సెట్ చేయడం
          sed -i 's|</widget>|    <icon src="logo.png" />\n    <preference name="AndroidWindowSplashScreenAnimatedIcon" value="logo.png" />\n    <preference name="AndroidWindowSplashScreenBackground" value="#E1F5FE" />\n    <preference name="SplashScreenDelay" value="0" />\n</widget>|' config.xml
          
          cordova plugin add cordova-plugin-x-socialsharing
          
          cordova platform add android
          cordova build android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LalithaTailors-APK
          path: app/platforms/android/app/build/outputs/apk/debug/*.apk
