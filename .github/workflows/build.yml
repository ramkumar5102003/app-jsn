name: Build HTML to APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create app com.lalitha.tailors "Lalitha Tailors"
          
          rm -rf app/www/*
          cp index.html app/www/
          cp logo.png app/www/ || true
          cp watermark.png app/www/ || true
          
          cd app
          # రోబోట్ బొమ్మను పూర్తిగా బ్లాక్ చేయడం (ShowSplashScreen = false)
          sed -i 's|</widget>|    <icon src="www/logo.png" />\n    <preference name="SplashScreenDelay" value="0" />\n    <preference name="ShowSplashScreen" value="false" />\n    <preference name="FadeSplashScreen" value="false" />\n</widget>|' config.xml
          
          cordova plugin add cordova-plugin-x-socialsharing
          # గమనిక: splashscreen ప్లగిన్ ను తీసివేశాను. దీనివల్లే రోబోట్ బొమ్మ వస్తుంది.
          
          cordova platform add android
          cordova build android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LalithaTailors-APK
          path: app/platforms/android/app/build/outputs/apk/debug/*.apk
